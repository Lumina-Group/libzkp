# Runs `cargo audit` against the locked dependency tree (requires Cargo.lock committed).
name: Security audit

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    # Weekly Monday 06:15 UTC
    - cron: "15 6 * * 1"

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          # 0.22+ 推奨: advisory-db の CVSS 4.0 エントリを解釈できる
          tool: cargo-audit@0.22
      - name: cargo audit
        run: |
          # ワークスペースの Cargo.lock はリポジトリルート（メンバー直下の Cargo.lock は使わない）
          if [ -f Cargo.lock ]; then
            cargo audit -f Cargo.lock
          elif [ -f libzkp/Cargo.toml ]; then
            (cd libzkp && cargo audit)
          else
            cargo audit
          fi
